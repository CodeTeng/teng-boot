spring:
  # 测试环境使用 H2 内存数据库
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    # 禁用 Druid（测试用 H2 不需要连接池）
    druid:
      enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  # Redis 配置（连接工厂会自动创建，即使 Redis 未运行也不会阻塞启动）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 线程池配置（从 dev 环境复制，防止 ThreadPoolProperties 默认值引起异常）
thread:
  pool:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 50
    keep-alive-seconds: 60

# COS 对象存储配置（测试环境提供占位值）
cos:
  client:
    accessKey: test-access-key
    secretKey: test-secret-key
    region: ap-beijing
    bucket: test-bucket

# AJ-Captcha 行为验证码配置（测试环境）
aj:
  captcha:
    type: blockPuzzle
    water-mark: Teng Boot Test
    font-type: Arial
    slip-offset: 5
    aes-status: true
    history-data-clear-enable: true
    req-frequency-limit-enable: true
    req-get-lock-limit: 100
    req-get-lock-seconds: 3600
    req-get-minute-limit: 100
    req-check-minute-limit: 100

# 取消 MyBatis-Plus 的 SQL 日志（测试环境不需要）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

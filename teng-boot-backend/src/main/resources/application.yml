# 公共配置文件
spring:
  application:
    name: teng-boot-scaffold
  # 默认 dev 环境
  profiles:
    active: dev

# MyBatisPlus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 驼峰映射开启
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启控制台打印 SQL
    cache-enabled: false # 使全局的映射器启用或禁用缓存
    lazy-loading-enabled: false # 全局启用或禁用延迟加载。当禁用时，所有关联对象都会即时加载
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan:  com.lt.boot.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: false
  setting:
    language: zh_cn

# AJ-Captcha 行为验证码配置
aj:
  captcha:
    type: blockPuzzle
    water-mark: Teng Boot
    font-type: Arial
    slip-offset: 5
    aes-status: true
    history-data-clear-enable: true
    req-frequency-limit-enable: true
    req-get-lock-limit: 5
    req-get-lock-seconds: 300
    req-get-minute-limit: 30
    req-check-minute-limit: 30

